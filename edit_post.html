<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body{
        background-image: url("https://images.rawpixel.com/image_800/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy93ZWJzaXRlX2NvbnRlbnQvbHIvdjU0NmJhdGNoMy1teW50LTM0LWJhZGdld2F0ZXJjb2xvcl8xLmpwZw.jpg");
        background-repeat: no-repeat;
        background-size: cover;
        }
</style>
<body class="bg-light">
<div class="container mt-4">
    <div class="container mt-2">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{category}} alert-dismissible fade show" role="alert">
                {{message}}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
        {%  endif %}
        {%  endwith %}
    </div>
    <h2>Edit Post</h2>
    <form method="post">
        <input type="text" name="title" class="form-control mb-2" value="{{ post.Title }}" required>
        <input type="text" name="description" class="form-control mb-2" value="{{ post.Description }}" required>
        <textarea name="content" class="form-control mb-2" rows="6" required>{{ post['Content'] }}</textarea>
        <button type="submit" class="btn btn-warning">Update</button>
    </form>
</div>
</body>
</html>
