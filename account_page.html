<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body{
        background-image: url("https://images.rawpixel.com/image_800/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy93ZWJzaXRlX2NvbnRlbnQvbHIvdjU0NmJhdGNoMy1teW50LTM0LWJhZGdld2F0ZXJjb2xvcl8xLmpwZw.jpg");
        background-repeat: no-repeat;
        background-size: cover;
        }
</style>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Blog Posts</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <ul class="navbar-nav">
                <li class="nav-item me-2">
                    <a class="nav-link active" aria-current="page">Home</a>
                </li>
            </ul>
            <div class="collapse navbar-collapse d-flex" id="navbarNavDropdown">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item me-2">
                        <a type="button" class="btn btn-danger" href="/logout" data-bs-toggle="modal" data-bs-target="#RegisterModal">
                            Logout
                        </a>
                    </li>
                    <li class="nav-item me-2">
                        <a type="button" class="btn btn-primary" href="/create_post" data-bs-toggle="modal" data-bs-target="#LoginModal">
                            Create New Post
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2 class="text-center">Welcome {{ user }}!</h2>
        <h4 class="mt-4">Your Blog Posts:</h4>
        {% if posts %}
            {% for post in posts %}
                <div class="card mt-3">
                    <div class="card-body">
                        <h5>{{ post['Title'] }}</h5>
                        <p>{{ post['Description'] }}</p>
                        <a href="/view_post/{{ post['_id'] }}" class="btn btn-success btn-sm">View</a>
                        <a href="/edit_post/{{ post['_id'] }}" class="btn btn-warning btn-sm">Edit</a>
                        <form action="/delete_post/{{ post['_id'] }}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <p class="text-muted mt-3">No posts yet.</p>
        {% endif %}
    </div>
</body>
</html>
