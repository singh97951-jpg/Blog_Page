<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.Title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body{
        background-image: url("https://images.rawpixel.com/image_800/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy93ZWJzaXRlX2NvbnRlbnQvbHIvdjU0NmJhdGNoMy1teW50LTM0LWJhZGdld2F0ZXJjb2xvcl8xLmpwZw.jpg");
        background-repeat: no-repeat;
        background-size: cover;
        }
</style>
<body class="bg-light">
    <div class="container mt-2">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{category}} alert-dismissible fade show" role="alert">
                {{message}}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
        {%  endif %}
        {%  endwith %}
    </div>
    <div class="container mt-5 bg-light p-4">
        <h1>{{ post['Title'] }}</h1>
        <p class="text-muted">By {{ post['Author'] }}</p>
        <h5>{{ post['Description'] }}</h5>
        <p>{{ post['Content'] }}</p>
        <a href="/" class="btn btn-secondary">Back to Home</a>
    </div>
</body>
</html>
